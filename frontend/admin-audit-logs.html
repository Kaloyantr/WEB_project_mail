<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail System | Audit Logs</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header"><div class="container header-inner"><a class="brand" href="dashboard.html">Mail System</a><nav class="main-nav"></nav></div></header>
  <main class="container page-shell">
    <section class="panel">
      <h1>Audit Logs</h1>
      <form class="toolbar" id="audit-filter-form">
        <input name="user_id" type="number" placeholder="User ID">
        <input name="action" placeholder="Action">
        <button class="button primary" type="submit">Filter</button>
      </form>
      <p id="audit-notice" class="form-message" hidden></p>
      <div class="table-wrap"><table><thead><tr><th>ID</th><th>User</th><th>Action</th><th>Details</th><th>Date</th></tr></thead><tbody id="audit-table"></tbody></table></div>
    </section>
  </main>
  <script src="../js/api.js"></script><script src="../js/ui.js"></script><script src="../js/navigation.js"></script><script src="../js/audit_logs.js"></script>
</body>
</html>
