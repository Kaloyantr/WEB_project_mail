<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail System | My Reviews</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header"><div class="container header-inner"><a class="brand" href="dashboard.html">Mail System</a><nav class="main-nav"></nav></div></header>
  <main class="container page-shell">
    <section class="split-layout">
      <div class="panel">
        <h1>My Reviews</h1>
        <p id="reviews-notice" class="form-message" hidden></p>
        <div class="table-wrap"><table><thead><tr><th>Topic</th><th>Anonymous box</th><th>Deadline</th><th>Action</th></tr></thead><tbody id="reviews-table"></tbody></table></div>
      </div>
      <aside class="panel">
        <h2>Send Review</h2>
        <form class="compact-form" id="review-form">
          <input type="hidden" name="topic_id">
          <input type="hidden" name="sender_box_id">
          <label><span>Subject</span><input name="subject" required></label>
          <label><span>Body</span><textarea name="body" rows="8" required></textarea></label>
          <button class="button primary" type="submit">Send Review</button>
        </form>
      </aside>
    </section>
  </main>
  <script src="../js/api.js"></script><script src="../js/ui.js"></script><script src="../js/navigation.js"></script><script src="../js/my_reviews.js"></script>
</body>
</html>
