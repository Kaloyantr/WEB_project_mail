<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail System | Users</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="dashboard.html">Mail System</a>
      <nav class="main-nav"></nav>
    </div>
  </header>
  <main class="container page-shell">
    <section class="split-layout">
      <div class="panel">
        <div class="section-head">
          <div>
            <h1>Users</h1>
            <p class="section-text">Manage system users and roles.</p>
          </div>
        </div>
        <p id="users-notice" class="form-message" hidden></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-table"></tbody>
          </table>
        </div>
      </div>
      <aside class="panel">
        <h2 id="user-form-title">Create User</h2>
        <form class="compact-form" id="user-form">
          <input type="hidden" name="id">
          <label><span>Name</span><input name="name" required></label>
          <label><span>Email</span><input name="email" type="email" required></label>
          <label><span>Password</span><input name="password" type="password" autocomplete="new-password"></label>
          <label>
            <span>Role</span>
            <select name="role">
              <option value="user">user</option>
              <option value="moderator">moderator</option>
              <option value="admin">admin</option>
            </select>
          </label>
          <button class="button primary" type="submit">Save</button>
          <button class="button" type="button" id="user-form-reset">Clear</button>
        </form>
      </aside>
    </section>
  </main>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
