<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail System | Groups</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="dashboard.html">Mail System</a>
      <nav class="main-nav"></nav>
    </div>
  </header>
  <main class="container page-shell">
    <section class="split-layout">
      <div class="panel">
        <h1>Groups</h1>
        <p id="groups-notice" class="form-message" hidden></p>
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Name</th><th>Description</th><th>Members</th><th>Actions</th></tr></thead>
            <tbody id="groups-table"></tbody>
          </table>
        </div>
      </div>
      <aside class="panel">
        <h2 id="group-form-title">Create Group</h2>
        <form class="compact-form" id="group-form">
          <input type="hidden" name="id">
          <label><span>Name</span><input name="name" required></label>
          <label><span>Description</span><textarea name="description" rows="4"></textarea></label>
          <label><span>Members</span><select name="member_user_ids" id="group-members-select" multiple size="8"></select></label>
          <button class="button primary" type="submit">Save</button>
          <button class="button" type="button" id="group-form-reset">Clear</button>
        </form>
      </aside>
    </section>
  </main>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/groups.js"></script>
</body>
</html>
