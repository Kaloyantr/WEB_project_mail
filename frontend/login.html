<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail System | Login</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="login.html">Mail System</a>
      <nav class="main-nav">
        <a href="login.html" class="active">Login</a>
      </nav>
    </div>
  </header>
  <main class="container page-shell narrow">
    <section class="panel">
      <h1>Login</h1>
      <p class="section-text">Enter your credentials to access the internal mail system.</p>
      <form class="form-grid" id="login-form">
        <label><span>Email</span><input type="email" name="email" placeholder="name@example.com" autocomplete="username" required></label>
        <label><span>Password</span><input type="password" name="password" placeholder="********" autocomplete="current-password" required></label>
        <p id="login-message" class="form-message" hidden></p>
        <button type="submit" class="button primary">Login</button>
      </form>
    </section>
  </main>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
