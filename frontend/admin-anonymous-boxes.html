<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail System | Anonymous Boxes</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="dashboard.html">Mail System</a>
      <nav class="main-nav"></nav>
    </div>
  </header>
  <main class="container page-shell">
    <section class="split-layout">
      <div class="panel">
        <h1>Anonymous Boxes</h1>
        <p id="boxes-notice" class="form-message" hidden></p>
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Display</th><th>Topic</th><th>Real User</th><th>Actions</th></tr></thead>
            <tbody id="boxes-table"></tbody>
          </table>
        </div>
      </div>
      <aside class="panel">
        <h2 id="box-form-title">Create Box</h2>
        <form class="compact-form" id="box-form">
          <input type="hidden" name="id">
          <label><span>Display name</span><input name="display_name" required></label>
          <label><span>Real user</span><select name="real_user_id" id="box-user-select"></select></label>
          <label><span>Topic</span><select name="topic_id" id="box-topic-select"><option value="">None</option></select></label>
          <button class="button primary" type="submit">Save</button>
          <button class="button" type="button" id="box-form-reset">Clear</button>
        </form>
      </aside>
    </section>
  </main>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/navigation.js"></script>
  <script src="../js/anonymous_boxes.js"></script>
</body>
</html>
